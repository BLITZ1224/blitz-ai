<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Football Retro</title>
    <style>
        body { margin: 0; background: #000; color: white; text-align: center; font-family: sans-serif; }
        #game-container { width: 100vw; height: 80vh; }
        .controls { padding: 20px; color: #00f2ff; font-weight: bold; }
    </style>
</head>
<body>

    <h2>⚽ BLITZ RETRO FOOTBALL ⚽</h2>
    
    <div id="game-container">
        <div id="emulator"></div>
    </div>

    <div class="controls">
        PC: Arrow Keys (Move), Z (A), X (B), Enter (Start)<br>
        Mobile: On-screen buttons will appear!
    </div>

    <script>
        EmuJS = {
            use_visual_settings: false,
            core: "gba", // Game Boy Advance အတွက်
            game_url: "game.gba", // မင်းတင်မယ့် ဂိမ်းဖိုင်နာမည်
            container: "#emulator",
        };
    </script>
    <script src="https://www.emulatorjs.com/loader.js"></script>

</body>
</html>
