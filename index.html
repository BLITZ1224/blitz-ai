<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ RETRO GAMING | FOOTBALL</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: sans-serif;
            overflow: hidden;
        }
        #game-display { 
            width: 100vw; height: 100vh; 
        }
        /* Mobile မှာ ဆော့ရတာ အဆင်ပြေအောင် Screen အပြည့်ထားတယ် */
    </style>
</head>
<body>

    <div id="game-display"></div>

    <script>
        // Emulator Configuration
        window.EJS_player = '#game-display';
        window.EJS_core = 'gba'; 
        window.EJS_gameUrl = 'game.gba'; // GitHub ထဲက မင်းရဲ့ .gba ဖိုင်နာမည်နဲ့ တူရမယ်

        // HTTPS သေချာစေဖို့ Official EmulatorJS Data ကို သုံးထားတယ်
        window.EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/';
        
        window.EJS_startOnLoaded = true;
    </script>
    
    <script src="https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/loader.js"></script>

</body>
</html>
